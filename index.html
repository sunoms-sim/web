<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Okovalo ERP | Next-Gen Enterprise Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');

        :root {
            --brand-primary: #2563eb;
            --bg-main: #ffffff;
            --text-main: #0f172a;
            --grid-color: rgba(15, 23, 42, 0.05);
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            overflow-x: hidden;
            margin: 0;
        }

        /* The "Wow" Grid Background - Adjusted for Light Mode */
        .grid-overlay {
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
            mask-image: radial-gradient(circle at center, black, transparent 90%);
        }

        .glow-sphere {
            position: absolute;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(37, 99, 235, 0.06) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(100px);
            z-index: 1;
            pointer-events: none;
        }

        /* Kinetic Typography Effect */
        .hero-title {
            font-size: clamp(3rem, 10vw, 8rem);
            font-weight: 700;
            line-height: 0.9;
            letter-spacing: -0.04em;
            perspective: 1000px;
        }

        .hero-title span {
            display: inline-block;
            transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1), color 0.3s ease;
        }

        .hero-title:hover span {
            transform: skewX(-5deg) rotateY(5deg);
            color: var(--brand-primary);
        }

        /* Neo-Brutalist Badge Styles - Adjusted for Light Mode */
        .glass-badge {
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(15, 23, 42, 0.08);
            backdrop-filter: blur(20px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.04);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-badge:hover {
            border-color: var(--brand-primary);
            background: rgba(255, 255, 255, 1);
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 50px rgba(37, 99, 235, 0.1);
        }

        /* Animation Keyframes */
        @keyframes float-badge {
            0%, 100% { transform: translateY(0px) translateX(0px); }
            33% { transform: translateY(-15px) translateX(5px); }
            66% { transform: translateY(10px) translateX(-5px); }
        }

        .float-animation {
            animation: float-badge 6s ease-in-out infinite;
        }

        /* Scroller Styling */
        .scroller {
            height: 40px;
            overflow: hidden;
            border-left: 2px solid var(--brand-primary);
            padding-left: 1rem;
        }

        .scroller-inner {
            animation: scroll-text 8s infinite;
        }

        @keyframes scroll-text {
            0%, 20% { transform: translateY(0); }
            25%, 45% { transform: translateY(-40px); }
            50%, 70% { transform: translateY(-80px); }
            75%, 95% { transform: translateY(-120px); }
            100% { transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="grid-overlay"></div>
    <div class="glow-sphere" style="top: -10%; left: -10%;"></div>
    <div class="glow-sphere" style="bottom: -10%; right: -10%; background: radial-gradient(circle, rgba(147, 51, 234, 0.04) 0%, transparent 70%);"></div>

    <nav class="fixed top-0 left-0 w-full z-50 flex items-center justify-between px-8 py-6 backdrop-blur-md border-b border-slate-200/50">
        <div class="text-xl font-bold tracking-tighter flex items-center gap-2">
            <div class="w-5 h-5 bg-blue-600 rounded-sm skew-x-12 shadow-lg shadow-blue-600/20"></div>
            <span class="text-slate-900">OKOVALO</span>
        </div>
        <div class="hidden md:flex gap-8 text-[11px] font-bold uppercase tracking-[0.2em] text-slate-400">
            <a href="#" class="hover:text-blue-600 transition">Engine</a>
            <a href="#" class="hover:text-blue-600 transition">Network</a>
            <a href="#" class="hover:text-blue-600 transition">Nodes</a>
        </div>
        <button class="px-5 py-2 border border-slate-200 rounded-full text-xs font-bold text-slate-900 hover:bg-slate-50 transition">
            Launch Console
        </button>
    </nav>

    <main class="relative min-h-screen flex flex-col items-center justify-center pt-20 px-6 z-10">
        
        <!-- Animated Interface Fragments -->
        <div class="absolute inset-0 pointer-events-none">
            <div class="glass-badge float-animation absolute top-[15%] left-[8%] p-4 rounded-xl flex items-center gap-4 pointer-events-auto" style="animation-delay: 0s;">
                <div class="w-10 h-10 rounded bg-blue-50 flex items-center justify-center text-blue-600">
                    <i class="fas fa-terminal text-sm"></i>
                </div>
                <div>
                    <div class="text-[10px] text-slate-400 font-bold uppercase">System Status</div>
                    <div class="text-sm font-bold tracking-tight text-slate-700">Active Nodes: 1,402</div>
                </div>
            </div>

            <div class="glass-badge float-animation absolute bottom-[20%] left-[10%] p-4 rounded-xl flex items-center gap-4 pointer-events-auto" style="animation-delay: -2s;">
                <div class="w-10 h-10 rounded bg-emerald-50 flex items-center justify-center text-emerald-600">
                    <i class="fas fa-microchip text-sm"></i>
                </div>
                <div>
                    <div class="text-[10px] text-slate-400 font-bold uppercase">Processing</div>
                    <div class="text-sm font-bold tracking-tight text-slate-700">99.9% Efficiency</div>
                </div>
            </div>

            <div class="glass-badge float-animation absolute top-[25%] right-[10%] p-4 rounded-xl flex items-center gap-4 pointer-events-auto" style="animation-delay: -4s;">
                <div class="w-10 h-10 rounded bg-purple-50 flex items-center justify-center text-purple-600">
                    <i class="fas fa-shield-halved text-sm"></i>
                </div>
                <div>
                    <div class="text-[10px] text-slate-400 font-bold uppercase">Security</div>
                    <div class="text-sm font-bold tracking-tight text-slate-700">Encrypted Layer</div>
                </div>
            </div>
        </div>

        <div class="text-center max-w-6xl">
            <div class="inline-flex items-center gap-2 px-3 py-1 border border-blue-100 rounded-full bg-blue-50/50 text-[10px] font-bold tracking-widest uppercase mb-6 text-blue-600">
                <span class="w-1.5 h-1.5 rounded-full bg-blue-600 animate-pulse"></span>
                v4.0 Core Engine Live
            </div>

            <h1 class="hero-title mb-10 text-slate-900">
                <span>ORCHESTRATE</span> <br>
                <span class="text-slate-200 hover:text-slate-900">EVERYTHING.</span>
            </h1>

            <div class="flex flex-col md:flex-row items-center justify-center gap-8 mb-16">
                <div class="scroller">
                    <div class="scroller-inner text-left">
                        <div class="h-10 text-xl font-medium text-slate-500">Automate your Finance core.</div>
                        <div class="h-10 text-xl font-medium text-slate-500">Scale your Supply Chain.</div>
                        <div class="h-10 text-xl font-medium text-slate-500">Empower your Talent hub.</div>
                        <div class="h-10 text-xl font-medium text-slate-500">Deploy Global Intelligence.</div>
                    </div>
                </div>
                
                <div class="flex gap-4">
                    <button class="px-8 py-4 bg-blue-600 text-white rounded font-bold text-sm uppercase tracking-wider hover:bg-blue-700 transition-all duration-300 shadow-xl shadow-blue-600/20">
                        Get Started
                    </button>
                    <button class="px-8 py-4 border border-slate-200 bg-white text-slate-600 rounded font-bold text-sm uppercase tracking-wider hover:border-slate-400 transition-all">
                        Documentation
                    </button>
                </div>
            </div>

            <!-- Dashboard Preview Snippet - Light Mode Polish -->
            <div class="relative max-w-4xl mx-auto rounded-t-2xl border-t border-x border-slate-200 bg-gradient-to-b from-slate-50 to-transparent p-4 md:p-8 shadow-2xl shadow-slate-200">
                <div class="flex gap-1.5 mb-6">
                    <div class="w-2 h-2 rounded-full bg-slate-200"></div>
                    <div class="w-2 h-2 rounded-full bg-slate-200"></div>
                    <div class="w-2 h-2 rounded-full bg-slate-200"></div>
                </div>
                <div class="grid grid-cols-3 gap-4">
                    <div class="h-32 rounded-lg bg-white border border-slate-100 animate-pulse"></div>
                    <div class="h-32 rounded-lg bg-white border border-slate-100 animate-pulse" style="animation-delay: 0.2s;"></div>
                    <div class="h-32 rounded-lg bg-white border border-slate-100 animate-pulse" style="animation-delay: 0.4s;"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Interactive Glow Movement
        document.addEventListener('mousemove', (e) => {
            const glow = document.querySelector('.glow-sphere');
            const x = e.clientX - 400;
            const y = e.clientY - 400;
            glow.style.transform = `translate(${x * 0.05}px, ${y * 0.05}px)`;
        });
    </script>
</body>
</html>
